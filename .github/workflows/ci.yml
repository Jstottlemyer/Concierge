# CI pipeline — runs lint, typecheck, tests, build, and the sha256 integrity
# gate on every push and pull request.
#
# Hybrid matrix per plan.md T19: ubuntu for lint/unit/build (fast, cheap);
# macOS-only packaging lives in package-mcpb.yml because `.mcpb` assembly
# needs the darwin gws binary. On ubuntu we can still verify the pinned
# sha256s — we only read bytes from the upstream tarballs, we don't execute
# them.
#
# Spec refs:
#   - spec.md §Distribution AC §29–31
#   - plan.md Decision #11 (binary integrity + regression guard)
#   - plan.md T19, T20
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — saves runner minutes on rapid
# push cycles. Tag/release runs get their own group so they never cancel.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt into Node 24 runtime for JS actions ahead of the 2026-06-02 default flip.
# Silences the deprecation warning for actions/checkout@v4, setup-node@v4,
# upload-artifact@v4, pnpm/action-setup@v4.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test-build:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          # Pinned to match `packageManager` field in package.json.
          version: 10.33.0

      - name: Setup Node 20 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm --filter @concierge/google-workspace build

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: packages/google-workspace/dist/
          if-no-files-found: error
          retention-days: 7

  setup-orchestrator:
    name: Setup orchestrator (macos-14)
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          # Pinned to match `packageManager` field in package.json.
          version: 10.33.0

      - name: Setup Node 20 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache Homebrew
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/Library/Caches/Homebrew/api
            ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install fixture shims on PATH
        run: |
          chmod 755 tests/fixtures/bin/claude tests/fixtures/bin/gws
          echo "${PWD}/tests/fixtures/bin" >> "$GITHUB_PATH"

      - name: Verify shims override real binaries
        run: |
          which claude
          which gws
          claude --version  # should print "claude 1.0.42 (test shim)"
          gws --version     # should print "gws 0.22.5 (test shim)"

      - name: Typecheck
        run: pnpm --filter @concierge/setup typecheck

      - name: Lint
        run: pnpm --filter @concierge/setup lint

      - name: Unit tests + integration
        env:
          CONCIERGE_SETUP_INTEGRATION: '1'
        run: pnpm --filter @concierge/setup test

      - name: Setup probe timing (regression alarm)
        working-directory: packages/setup
        env:
          CONCIERGE_SETUP_INTEGRATION: '1'
        run: pnpm probe-timing

  verify-gws-checksums:
    name: verify bundled gws sha256 pins
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Verify each pinned arch against upstream release tarball
        shell: bash
        run: |
          set -euo pipefail

          CHECKSUM_FILE="packages/google-workspace/build/gws-checksums.txt"
          if [[ ! -f "$CHECKSUM_FILE" ]]; then
            echo "::error::$CHECKSUM_FILE not found"
            exit 1
          fi

          fail=0
          # Parse non-comment lines: <sha256>  <arch>  <version>
          while IFS= read -r line; do
            # Strip comments and blanks.
            trimmed="${line%%#*}"
            trimmed="$(echo "$trimmed" | xargs || true)"
            [[ -z "$trimmed" ]] && continue

            read -r expected_sha arch version <<<"$trimmed"

            if [[ "$expected_sha" == "PENDING_CAPTURE_FROM_UPSTREAM" ]]; then
              echo "::warning::$arch is PENDING_CAPTURE_FROM_UPSTREAM — skipping verification"
              continue
            fi

            case "$arch" in
              darwin-arm64) asset="google-workspace-cli-aarch64-apple-darwin.tar.gz" ;;
              darwin-x64)   asset="google-workspace-cli-x86_64-apple-darwin.tar.gz" ;;
              *)
                echo "::error::unknown arch '$arch' in $CHECKSUM_FILE"
                fail=1
                continue
                ;;
            esac

            url="https://github.com/googleworkspace/cli/releases/download/${version}/${asset}"
            echo "--- verifying $arch ($version) ---"
            echo "downloading: $url"

            tmp="$(mktemp -d)"
            curl -fsSL -o "${tmp}/${asset}" "$url"
            tar -xzf "${tmp}/${asset}" -C "${tmp}"

            # Locate the `gws` binary inside the extracted tree (upstream layout
            # has historically been flat, but guard against nested layouts).
            bin_path="$(find "${tmp}" -type f -name gws -perm -u+x | head -n1 || true)"
            if [[ -z "$bin_path" ]]; then
              bin_path="$(find "${tmp}" -type f -name gws | head -n1 || true)"
            fi
            if [[ -z "$bin_path" ]]; then
              echo "::error::could not find gws binary in extracted tarball for $arch"
              fail=1
              continue
            fi

            actual_sha="$(sha256sum "$bin_path" | awk '{print $1}')"

            if [[ "$actual_sha" == "$expected_sha" ]]; then
              echo "OK: $arch $version sha256 matches pin"
            else
              echo "::error::sha256 mismatch for $arch $version"
              echo "  expected: $expected_sha"
              echo "  actual:   $actual_sha"
              fail=1
            fi

            rm -rf "$tmp"
          done < "$CHECKSUM_FILE"

          if [[ "$fail" -ne 0 ]]; then
            echo "::error::one or more sha256 pins did not match upstream — refusing to release"
            exit 1
          fi
          echo "all pinned sha256s verified against upstream"
