# Release packaging — builds per-arch `.mcpb` bundles on tag push.
#
# Fires on vendor-specific tags `google-workspace-vX.Y.Z` and release candidates
# `google-workspace-vX.Y.Z-rcN`. Legacy `vX.Y.Z` tags were removed 2026-04-15
# because they bypassed the signing gate. `workflow_dispatch` runs produce
# UNSIGNED test builds only (`workflow_artifact` tier, not release assets).
#
# Ordering:
#   1. Re-run the full ubuntu CI suite (lint / typecheck / test / build)
#      as a prerequisite — no release without a green build.
#   2. Two macOS packaging jobs in parallel (arm64 on macos-14, x64 on
#      macos-13). Each fetches + sha256-verifies the pinned gws binary,
#      stages it alongside dist/, and zips to a `.mcpb` release asset.
#   3. arm64 only: Developer ID codesign + hardened runtime + Apple
#      notarization via App Store Connect API key. Unsigned bits never
#      leak — signing failure scraps all artifacts for that run.
#   4. arm64 only: SLSA build-provenance attestation published alongside
#      the signed .mcpb so downstream verifiers can run `gh attestation
#      verify <file> --repo Jstottlemyer/Concierge`.
#
# Spec refs:
#   - docs/vendors/google-workspace/spec.md §Distribution AC §29–31
#   - docs/vendors/google-workspace/plan.md Decision #11 (binary integrity)
#   - docs/specs/ci-signing-automation/{spec,plan,check}.md (CI signing flow)
name: package-mcpb

on:
  push:
    tags:
      - 'google-workspace-v*.*.*'
      # Legacy 'v*.*.*' pattern removed 2026-04-15 — it bypassed the signing
      # gate (which matches only 'google-workspace-v*'), producing unsigned
      # draft releases. See docs/specs/ci-signing-automation/plan.md B4.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to package (workflow_dispatch runs are UNSIGNED test builds only; signing is tag-push-only).'
        required: true
        default: 'main'
  # F0 (setup-hardening-v2): expose this workflow as a reusable component so the
  # coordinated `release-v*.*.*` workflow (F1) can fan out package-mcpb as a
  # sub-job, then run package-setup on top with the produced .mcpb in hand.
  # Behavior on the existing tag-trigger path is unchanged — when invoked via
  # `workflow_call`, the caller passes `version` (and optionally a `release-tag`
  # to attach the artifact to a different release than the tag that triggered
  # the build, e.g. `release-v0.3.0` instead of `google-workspace-v0.3.0`).
  workflow_call:
    inputs:
      version:
        description: 'Version string baked into the artifact filename (e.g. "0.3.0"). Required when caller is not a google-workspace-v* tag push.'
        required: true
        type: string
      arch:
        description: 'Target arch slug. Currently only darwin-arm64 is signed; kept for future cross-arch support.'
        required: false
        type: string
        default: 'darwin-arm64'
      release-tag:
        description: 'If set, the signed artifact is attached to this GitHub Release tag (e.g. "release-v0.3.0") instead of the tag that triggered the build. Enables coordinated release-v* tags to publish the .mcpb under themselves.'
        required: false
        type: string
        default: ''
    outputs:
      mcpb-path:
        description: 'Filename of the produced .mcpb artifact in the runner workspace root (caller can re-download via actions/download-artifact using this name).'
        value: ${{ jobs.package-darwin-arm64.outputs.mcpb-path }}
      mcpb-sha256:
        description: 'SHA-256 of the produced (signed, when applicable) .mcpb artifact.'
        value: ${{ jobs.package-darwin-arm64.outputs.mcpb-sha256 }}

permissions:
  contents: write       # release upload
  id-token: write       # SLSA build-provenance attestation (D2)
  attestations: write   # SLSA build-provenance attestation (D2)

# Series-wide concurrency (not per-ref) so parallel `-rc1` / `-rc2` / `vX.Y.Z`
# pushes serialize at the notary queue, not collide. `cancel-in-progress:
# false` lets every `-rcN` finish so its notary log is available for
# debugging. See docs/specs/ci-signing-automation/plan.md C5.
concurrency:
  group: release-google-workspace
  cancel-in-progress: false

env:
  PKG_DIR: packages/google-workspace
  # Opt into Node 24 runtime for JS actions ahead of the 2026-06-02 default
  # flip (silences deprecation warnings from checkout/setup-node/upload-artifact).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Prereq: full ubuntu CI must pass before we burn macOS minutes.
  lint-test-build:
    name: lint + typecheck + test + build (prereq)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.33.0

      - name: Setup Node 20 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm --filter @concierge/google-workspace build

  package-darwin-arm64:
    name: package darwin-arm64 (.mcpb)
    needs: lint-test-build
    runs-on: macos-14  # Apple Silicon
    timeout-minutes: 20
    outputs:
      mcpb-path:   ${{ steps.artifact-meta.outputs.mcpb-path }}
      mcpb-sha256: ${{ steps.artifact-meta.outputs.mcpb-sha256 }}
    env:
      ARCH: darwin-arm64
      # Mirrors build/pack.sh asset naming: aarch64 for arm64 macs.
      ASSET: google-workspace-cli-aarch64-apple-darwin.tar.gz
      PKG_DIR: packages/google-workspace
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Unified signing-trigger gate. The original tag-pattern check
      # (`startsWith(github.ref, 'refs/tags/google-workspace-v')`) is
      # preserved for tag pushes; when invoked via `workflow_call`, the
      # caller's `release-tag` input (e.g. `release-v0.3.0`) opts the
      # build into the same signing path. workflow_dispatch keeps producing
      # unsigned test builds (no inputs.release-tag, no matching ref).
      - name: Decide whether to sign
        id: sign-gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/google-workspace-v* ]] \
             || [[ -n "${{ inputs.release-tag }}" ]]; then
            echo "should_sign=true"  >> "$GITHUB_OUTPUT"
          else
            echo "should_sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.33.0

      - name: Setup Node 20 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm --filter @concierge/google-workspace build

      - name: Resolve pinned gws version + sha256
        id: pin
        shell: bash
        run: |
          set -euo pipefail
          line="$(grep -E "^[0-9a-f]{64}[[:space:]]+${ARCH}[[:space:]]+v" ${PKG_DIR}/build/gws-checksums.txt | head -n1)"
          if [[ -z "$line" ]]; then
            echo "::error::no pinned sha for ${ARCH} in ${PKG_DIR}/build/gws-checksums.txt"
            exit 1
          fi
          sha="$(echo "$line" | awk '{print $1}')"
          version="$(echo "$line" | awk '{print $3}')"
          echo "sha=$sha"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download + verify gws binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ${PKG_DIR}/bin
          url="https://github.com/googleworkspace/cli/releases/download/${{ steps.pin.outputs.version }}/${ASSET}"
          echo "downloading $url"
          curl -fsSL -o "${ASSET}" "$url"
          tar -xzf "${ASSET}"
          bin_path="$(find . -maxdepth 3 -type f -name gws | head -n1)"
          if [[ -z "$bin_path" ]]; then
            echo "::error::could not find gws in extracted tarball"
            exit 1
          fi
          actual="$(shasum -a 256 "$bin_path" | awk '{print $1}')"
          expected="${{ steps.pin.outputs.sha }}"
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::sha256 mismatch: expected=$expected actual=$actual"
            exit 1
          fi
          mv "$bin_path" ${PKG_DIR}/bin/gws
          chmod +x ${PKG_DIR}/bin/gws
          echo "gws verified and staged at ${PKG_DIR}/bin/gws"

      - name: Assemble .mcpb staging directory
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          # Precedence: workflow_call `inputs.version` (F0/F1 path) > tag-strip
          # > manifest fallback. Tag-trigger path is unchanged: when the build
          # is started by `git push --tags google-workspace-vX.Y.Z`, INPUT_VERSION
          # is empty and we fall through to the original tag-strip logic, which
          # produces the same VERSION as before.
          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          elif [[ "$TAG_NAME" == google-workspace-v* ]]; then
            VERSION="${TAG_NAME#google-workspace-v}"
          else
            # workflow_dispatch path — fall back to manifest version; result
            # will be an UNSIGNED test build.
            VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('${PKG_DIR}/manifest.json','utf8')).version)")"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          stage="${PKG_DIR}/.mcpb-staging"
          rm -rf "$stage"
          mkdir -p "$stage/bin"
          cp ${PKG_DIR}/manifest.json "$stage/"
          cp -R ${PKG_DIR}/dist "$stage/dist"
          cp ${PKG_DIR}/bin/gws "$stage/bin/gws"
          [[ -f ${PKG_DIR}/LICENSE ]]     && cp ${PKG_DIR}/LICENSE     "$stage/"  || true
          [[ -f ${PKG_DIR}/LICENSE.gws ]] && cp ${PKG_DIR}/LICENSE.gws "$stage/"  || true
          [[ -f ${PKG_DIR}/NOTICE.gws ]]  && cp ${PKG_DIR}/NOTICE.gws  "$stage/"  || true

      - name: Zip to .mcpb
        shell: bash
        run: |
          set -euo pipefail
          OUT="Concierge-GoogleWorkspace-${VERSION}-${ARCH}.mcpb"
          (cd ${PKG_DIR}/.mcpb-staging && zip -qr "${GITHUB_WORKSPACE}/${OUT}" .)
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "produced: ${OUT}"

      # ─────────────────────────────────────────────────────────────────────
      # Signing + notarization (C6 → E2 per plan.md).
      #
      # Only runs on version tags — workflow_dispatch branch pushes produce
      # unsigned test builds (no secrets in scope).
      # ─────────────────────────────────────────────────────────────────────

      - name: Version integrity check (manifest.json vs tag)
        if: steps.sign-gate.outputs.should_sign == 'true'
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          MANIFEST_VERSION="$(jq -r .version ${PKG_DIR}/manifest.json)"
          # When called via workflow_call (F0/F1 path), GITHUB_REF_NAME is the
          # caller's tag (e.g. `release-v0.3.0`), not a `google-workspace-v*`
          # tag — fall back to the explicit `version` input. Tag-trigger path
          # behaves exactly as before (INPUT_VERSION is empty).
          if [[ -n "${INPUT_VERSION}" ]]; then
            TAG_VERSION="${INPUT_VERSION}"
          else
            TAG_VERSION="${GITHUB_REF_NAME#google-workspace-v}"
          fi
          # Strip any '-rcN' suffix before comparing with manifest.
          TAG_CORE_VERSION="${TAG_VERSION%-rc*}"
          if [[ "$MANIFEST_VERSION" != "$TAG_CORE_VERSION" ]]; then
            echo "::error title=Version mismatch::manifest.json says '$MANIFEST_VERSION' but version says '$TAG_CORE_VERSION'. Bump manifest.json and retag."
            exit 1
          fi
          echo "version integrity ok: manifest=$MANIFEST_VERSION version=$TAG_VERSION"

      - name: Install coreutils (for gtimeout in signer)
        if: steps.sign-gate.outputs.should_sign == 'true'
        run: brew install coreutils

      - name: Create ephemeral signing keychain
        if: steps.sign-gate.outputs.should_sign == 'true'
        env:
          P12_B64:  ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASS: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          # Per-run keychain name prevents collision on hypothetical runner reuse.
          KEYCHAIN="$RUNNER_TEMP/concierge-signing-${{ github.run_id }}.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 32)"
          echo "CONCIERGE_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain    -p "$KEYCHAIN_PASS" "$KEYCHAIN"

          # Decode p12 to tmpfs, import with -A (grant all apps on this
          # ephemeral keychain — runner is single-tenant one-shot).
          P12_PATH="$RUNNER_TEMP/concierge-devid.p12"
          echo "$P12_B64" | base64 -d > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN" -P "$P12_PASS" -A -T /usr/bin/codesign
          rm -f "$P12_PATH"

          # Make the keychain the default + first in search path.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed -e 's/"//g' | xargs)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"

      - name: Post-import sanity check (D6 — catches partition-list zero-but-no-effect)
        if: steps.sign-gate.outputs.should_sign == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if ! security find-identity -v -p codesigning "$CONCIERGE_KEYCHAIN" | grep -q "Developer ID Application"; then
            echo "::error title=Developer ID identity not visible::security import apparently succeeded but the identity isn't reachable via find-identity. Check -T ACL and partition-list interaction."
            security find-identity -v -p codesigning "$CONCIERGE_KEYCHAIN"
            exit 1
          fi
          echo "Developer ID Application identity visible and reachable."

      - name: Store notarytool API-key profile
        if: steps.sign-gate.outputs.should_sign == 'true'
        env:
          API_KEY:   ${{ secrets.NOTARY_API_KEY_P8 }}
          KEY_ID:    ${{ secrets.NOTARY_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$API_KEY" > "$KEY_PATH"
          # --keychain pins the profile to our ephemeral keychain so the Sign
          # step sees it (default login keychain may not be in search path).
          xcrun notarytool store-credentials concierge-notarize \
            --keychain "$CONCIERGE_KEYCHAIN" \
            --key "$KEY_PATH" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID"
          rm -f "$KEY_PATH"

      - name: Sign + notarize .mcpb
        if: steps.sign-gate.outputs.should_sign == 'true'
        env:
          CONCIERGE_SIGNING_IDENTITY: "Developer ID Application: JUSTIN HAYES STOTTLEMYER (${{ secrets.APPLE_TEAM_ID }})"
          CONCIERGE_TEAM_ID:          ${{ secrets.APPLE_TEAM_ID }}
          CONCIERGE_NOTARY_PROFILE:   concierge-notarize
        shell: bash
        run: |
          set -euo pipefail
          ${PKG_DIR}/build/sign-and-notarize.sh "$GITHUB_WORKSPACE/${OUT}"

      - name: Assert codesign chain of trust (E1 per plan.md)
        if: steps.sign-gate.outputs.should_sign == 'true'
        shell: bash
        run: |
          set -euo pipefail
          WORK="$(mktemp -d)"
          cd "$WORK"
          unzip -q "$GITHUB_WORKSPACE/${OUT}"
          OUT_CS="$(codesign -dvv bin/gws 2>&1)"
          echo "$OUT_CS"
          echo "$OUT_CS" | grep -qE "Authority=Developer ID Application.*${{ secrets.APPLE_TEAM_ID }}" \
            || { echo "::error::codesign Authority does not contain Developer ID Application + team ID"; exit 1; }
          echo "$OUT_CS" | grep -q "flags=0x10000(runtime)" \
            || { echo "::error::hardened runtime flag not set"; exit 1; }
          echo "$OUT_CS" | grep -q "TeamIdentifier=${{ secrets.APPLE_TEAM_ID }}" \
            || { echo "::error::TeamIdentifier mismatch"; exit 1; }
          if echo "$OUT_CS" | grep -q "Signature=adhoc"; then
            echo "::error::artifact has adhoc signature (not Developer ID)"; exit 1
          fi
          echo "codesign chain-of-trust assertions passed."

      - name: Assert notarization Accepted (E2 per plan.md)
        if: steps.sign-gate.outputs.should_sign == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # sign-and-notarize.sh exits 0 only if Apple returned Accepted; this
          # step is a belt-and-suspenders check that queries the API directly
          # against the most recent submission for our Team ID.
          SUB_ID="$(xcrun notarytool history \
            --keychain "$CONCIERGE_KEYCHAIN" \
            --keychain-profile concierge-notarize \
            --output-format json \
            | jq -r '.history[0].id')"
          STATUS="$(xcrun notarytool info "$SUB_ID" \
            --keychain "$CONCIERGE_KEYCHAIN" \
            --keychain-profile concierge-notarize \
            --output-format json \
            | jq -r '.status')"
          echo "submission $SUB_ID status: $STATUS"
          if [[ "$STATUS" != "Accepted" ]]; then
            echo "::error::notarization status '$STATUS' (expected 'Accepted')"
            xcrun notarytool log "$SUB_ID" \
              --keychain "$CONCIERGE_KEYCHAIN" \
              --keychain-profile concierge-notarize || true
            exit 1
          fi

      - name: Compute SHA-256 of signed .mcpb (for release body)
        if: steps.sign-gate.outputs.should_sign == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(shasum -a 256 "$GITHUB_WORKSPACE/${OUT}" | awk '{print $1}')"
          echo "MCPB_SHA256=$SHA" >> "$GITHUB_ENV"
          echo "signed artifact sha256: $SHA"

      # Job outputs for `workflow_call` consumers (F1 release.yml).
      # Computed unconditionally so dispatch/test runs still expose the path
      # to debugging tooling; SHA is computed here too as a backstop for
      # unsigned dispatch builds where MCPB_SHA256 wasn't set above.
      - name: Expose artifact metadata to workflow_call outputs
        id: artifact-meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${MCPB_SHA256:-}" ]]; then
            MCPB_SHA256="$(shasum -a 256 "$GITHUB_WORKSPACE/${OUT}" | awk '{print $1}')"
          fi
          echo "mcpb-path=${OUT}"          >> "$GITHUB_OUTPUT"
          echo "mcpb-sha256=${MCPB_SHA256}" >> "$GITHUB_OUTPUT"

      # D2 (SLSA attestation) — actions/attest-build-provenance is NOT
      # available on user-owned private repos (only orgs / public repos).
      # `continue-on-error` so the step attempts + logs warning without
      # blocking the release. When the repo flips public, this starts
      # producing real attestations automatically — no workflow change
      # needed. See docs/specs/ci-signing-automation/plan.md D2.
      - name: SLSA build-provenance attestation (D2 per plan.md)
        if: steps.sign-gate.outputs.should_sign == 'true'
        continue-on-error: true
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: ${{ env.OUT }}

      - name: Destroy ephemeral keychain
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${CONCIERGE_KEYCHAIN:-}" && -f "$CONCIERGE_KEYCHAIN" ]]; then
            security delete-keychain "$CONCIERGE_KEYCHAIN"
            if security list-keychains -d user | grep -q "$CONCIERGE_KEYCHAIN"; then
              echo "::warning::keychain cleanup silently failed — entry still in search path"
            else
              echo "ephemeral keychain destroyed cleanly."
            fi
          fi

      # ─────────────────────────────────────────────────────────────────────
      # Upload + release attach — intentionally AFTER signing so failed-sign
      # runs scrap every artifact (Q5 per plan.md C3).
      # ─────────────────────────────────────────────────────────────────────

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ env.OUT }}
          path: ${{ env.OUT }}
          if-no-files-found: error

      - name: Attach to GitHub Release (draft)
        if: steps.sign-gate.outputs.should_sign == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: ${{ env.OUT }}
          # When called via workflow_call from the coordinated `release-v*`
          # workflow (F1), attach the .mcpb to the caller's release tag instead
          # of the (nonexistent) `google-workspace-v*` tag. Empty string falls
          # back to action default = github.ref tag, preserving tag-trigger
          # behavior unchanged.
          tag_name: ${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}
          draft: true
          prerelease: ${{ contains(inputs.release-tag != '' && inputs.release-tag || github.ref_name, '-rc') }}
          name: Google Workspace v${{ env.VERSION }}
          body: |
            ## Concierge — Google Workspace ${{ env.VERSION }}

            **Signed:** Developer ID Application — Team `${{ secrets.APPLE_TEAM_ID }}`
            **Notarized:** Apple (see SLSA attestation below)
            **Hardened runtime:** yes
            **SHA-256:** `${{ env.MCPB_SHA256 }}`

            ### Install
            1. Download `${{ env.OUT }}`.
            2. Double-click; Claude Desktop opens the extension installer.
            3. Follow `docs/setup/quickstart.md` for first-run OAuth.

            ### Verify (optional, for security-conscious installers)

            ```sh
            # Hash integrity:
            shasum -a 256 ${{ env.OUT }}
            # expected: ${{ env.MCPB_SHA256 }}

            # Developer ID signature + notarization:
            unzip -p ${{ env.OUT }} bin/gws > /tmp/gws
            codesign -dvv /tmp/gws 2>&1 | grep Authority
            # expected: Authority=Developer ID Application: JUSTIN HAYES STOTTLEMYER (${{ secrets.APPLE_TEAM_ID }})

            # SLSA build provenance (requires gh CLI ≥ 2.49):
            gh attestation verify ${{ env.OUT }} --repo ${{ github.repository }}
            ```

  # x64 job disabled 2026-04-16 — `macos-13-us-default` is deprecated on the
  # free tier ("The configuration 'macos-13-us-default' is not supported").
  # Re-enable with `runs-on: macos-13` (paid) or migrate to macos-14 Rosetta
  # when x64 signing lights up in the backlog.
  package-darwin-x64:
    name: package darwin-x64 (.mcpb)
    needs: lint-test-build
    if: false
    runs-on: macos-13  # Intel
    timeout-minutes: 20
    env:
      ARCH: darwin-x64
      # Mirrors build/pack.sh asset naming: x86_64 for Intel macs.
      ASSET: google-workspace-cli-x86_64-apple-darwin.tar.gz
      PKG_DIR: packages/google-workspace
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.33.0

      - name: Setup Node 20 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm --filter @concierge/google-workspace build

      - name: Resolve pinned gws version + sha256
        id: pin
        shell: bash
        run: |
          set -euo pipefail
          line="$(grep -E "^[0-9a-f]{64}[[:space:]]+${ARCH}[[:space:]]+v" ${PKG_DIR}/build/gws-checksums.txt | head -n1)"
          if [[ -z "$line" ]]; then
            echo "::error::no pinned sha for ${ARCH} in ${PKG_DIR}/build/gws-checksums.txt"
            exit 1
          fi
          sha="$(echo "$line" | awk '{print $1}')"
          version="$(echo "$line" | awk '{print $3}')"
          echo "sha=$sha"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download + verify gws binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ${PKG_DIR}/bin
          url="https://github.com/googleworkspace/cli/releases/download/${{ steps.pin.outputs.version }}/${ASSET}"
          echo "downloading $url"
          curl -fsSL -o "${ASSET}" "$url"
          tar -xzf "${ASSET}"
          bin_path="$(find . -maxdepth 3 -type f -name gws | head -n1)"
          if [[ -z "$bin_path" ]]; then
            echo "::error::could not find gws in extracted tarball"
            exit 1
          fi
          actual="$(shasum -a 256 "$bin_path" | awk '{print $1}')"
          expected="${{ steps.pin.outputs.sha }}"
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::sha256 mismatch: expected=$expected actual=$actual"
            exit 1
          fi
          mv "$bin_path" ${PKG_DIR}/bin/gws
          chmod +x ${PKG_DIR}/bin/gws

      - name: Assemble .mcpb staging directory
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "$TAG_NAME" == google-workspace-v* ]]; then
            VERSION="${TAG_NAME#google-workspace-v}"
          else
            VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('${PKG_DIR}/manifest.json','utf8')).version)")"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          stage="${PKG_DIR}/.mcpb-staging"
          rm -rf "$stage"
          mkdir -p "$stage/bin"
          cp ${PKG_DIR}/manifest.json "$stage/"
          cp -R ${PKG_DIR}/dist "$stage/dist"
          cp ${PKG_DIR}/bin/gws "$stage/bin/gws"
          [[ -f ${PKG_DIR}/LICENSE ]]     && cp ${PKG_DIR}/LICENSE     "$stage/"  || true
          [[ -f ${PKG_DIR}/LICENSE.gws ]] && cp ${PKG_DIR}/LICENSE.gws "$stage/"  || true
          [[ -f ${PKG_DIR}/NOTICE.gws ]]  && cp ${PKG_DIR}/NOTICE.gws  "$stage/"  || true

      - name: Zip to .mcpb (UNSIGNED — x64 signing lights up when a target user emerges)
        shell: bash
        run: |
          set -euo pipefail
          OUT="Concierge-GoogleWorkspace-${VERSION}-${ARCH}.mcpb"
          (cd ${PKG_DIR}/.mcpb-staging && zip -qr "${GITHUB_WORKSPACE}/${OUT}" .)
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "produced: ${OUT}  (unsigned — x64 release attach disabled per plan.md C4)"

      - name: Upload as workflow artifact (drift detection only)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ env.OUT }}
          path: ${{ env.OUT }}
          if-no-files-found: error

      # C4: x64 release attach DISABLED until x64 signing is implemented. The
      # workflow artifact above is kept as a drift-detection signal (Intel build
      # still compiles) but never surfaces to end users. Re-enable only when x64
      # signing + notarization path is in place — guarded by the same tag
      # pattern arm64 uses.
      - name: Attach to GitHub Release
        if: false
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: ${{ env.OUT }}
          draft: true
